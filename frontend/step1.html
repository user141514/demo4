<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>信息采集 - 领导力建模智能体</title>
<link rel="stylesheet" href="style.css">
<style>
/* ── Step1 Layout ────────────────────────────────────────────── */
.step1-grid { display: grid; grid-template-columns: 1fr 300px; gap: 14px; flex: 1; min-height: 0; }
.main { display: flex; flex-direction: column; }
.main-inner { flex: 1; display: flex; flex-direction: column; min-height: 0; }

/* ── Chat Pane ───────────────────────────────────────────────── */
.chat-pane { display: flex; flex-direction: column; background: var(--sf); border-radius: 12px; border: 1px solid var(--br); box-shadow: var(--sh); overflow: hidden; min-height: 0; }
.chat-ttl { padding: 11px 14px; border-bottom: 1px solid var(--br); display: flex; align-items: center; gap: 8px; background: var(--sf2); flex-shrink: 0; }
.chat-ttl-main { font-size: 13px; font-weight: 600; color: var(--t1); }
.chat-ttl-sub { font-size: 11.5px; color: var(--t3); margin-left: auto; }
.chat-msgs { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 11px; min-height: 0; }
.msg { display: flex; gap: 8px; max-width: 90%; }
.msg.ai { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.doc { align-self: flex-start; }
.av { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.av-ai { background: var(--p10); border-color: var(--p20); color: var(--p); }
.av-doc { background: var(--a10); border-color: var(--a20); color: var(--adk); }
.bub { padding: 10px 13px; border-radius: 11px; font-size: 13.5px; line-height: 1.65; }
.bub-ai { background: var(--bg); border: 1px solid var(--br); border-radius: 3px 11px 11px 11px; color: var(--t1); }
.bub-user { background: var(--p); color: #fff; border-radius: 11px 3px 11px 11px; }
.bub-doc { background: var(--a10); border: 1px solid var(--a20); border-radius: 3px 11px 11px 11px; color: var(--adk); }
.typing { display: flex; gap: 5px; align-items: center; padding: 10px 13px; background: var(--bg); border: 1px solid var(--br); border-radius: 3px 11px 11px 11px; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--p40); animation: tp 1.2s ease-in-out infinite; }
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes tp { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-4px);opacity:1} }
.chat-foot { border-top: 1px solid var(--br); padding: 10px 12px; display: flex; gap: 8px; background: var(--sf2); flex-shrink: 0; }
.ci { flex: 1; border: 1.5px solid var(--br); border-radius: 8px; padding: 8px 11px; font-size: 13.5px; font-family: inherit; outline: none; resize: none; max-height: 80px; line-height: 1.5; color: var(--t1); background: var(--sf); transition: border-color .15s; }
.ci:focus { border-color: var(--p); box-shadow: 0 0 0 3px var(--p10); }
.csend { background: var(--p); color: #fff; border: none; border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 13.5px; font-weight: 500; transition: background .15s; white-space: nowrap; }
.csend:hover { background: var(--p80); }
.csend:disabled { opacity: .4; cursor: not-allowed; }

/* ── Right Panel ─────────────────────────────────────────────── */
.right-pane { display: flex; flex-direction: column; gap: 11px; overflow-y: auto; min-height: 0; }
.sum-card { background: var(--sf); border-radius: 12px; border: 1px solid var(--br); box-shadow: var(--sh); overflow: hidden; flex-shrink: 0; }
.sum-hd { background: var(--p10); padding: 10px 13px; font-size: 12.5px; font-weight: 600; color: var(--p80); border-bottom: 1px solid var(--p20); display: flex; align-items: center; gap: 7px; }
.sum-bd { padding: 12px 13px; }
.sf3 { margin-bottom: 8px; }
.sf3:last-child { margin-bottom: 0; }
.sf3-l { font-size: 10.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--t3); margin-bottom: 2px; font-weight: 500; }
.sf3-v { font-size: 12.5px; color: var(--t1); }
.confirm-ok { background: var(--grbg); border: 1px solid #86EFAC; border-radius: 9px; padding: 10px 13px; font-size: 12.5px; color: var(--gr); font-weight: 500; display: flex; align-items: center; gap: 7px; }
.confirm-pending { background: var(--ambg); border-color: #FDE68A; color: var(--am); justify-content: space-between; }
.summary-action { margin-top: 10px; display: flex; justify-content: flex-end; }

/* ── Upload Card ─────────────────────────────────────────────── */
.upload-card { background: var(--sf); border-radius: 12px; border: 1px solid var(--br); box-shadow: var(--sh); overflow: hidden; }
.upload-hd { background: var(--a10); padding: 10px 13px; font-size: 12.5px; font-weight: 600; color: var(--adk); border-bottom: 1px solid var(--a20); display: flex; align-items: center; gap: 7px; }
.upload-hd span { font-size: 11px; color: var(--a60); font-weight: 400; margin-left: auto; }
.dropzone { border: 2px dashed var(--brk); border-radius: 10px; padding: 16px 13px; text-align: center; cursor: pointer; transition: all .2s; margin: 11px; background: var(--bg); position: relative; }
.dropzone:hover, .dropzone.over { border-color: var(--a); background: var(--a10); }
.dropzone p { font-size: 12.5px; color: var(--t2); margin: 4px 0; }
.dropzone b { color: var(--a); }
.dropzone small { font-size: 11px; color: var(--t3); }
.file-input-real { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.fl { display: flex; flex-direction: column; }
.fi { padding: 9px 13px; border-top: 1px solid var(--br); display: flex; align-items: flex-start; gap: 8px; }
.fi-ico { font-size: 17px; flex-shrink: 0; margin-top: 2px; }
.fi-info { flex: 1; min-width: 0; }
.fi-name { font-size: 12.5px; font-weight: 500; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fi-meta { font-size: 11px; color: var(--t3); margin-top: 1px; }
.fi-act { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
.fi-act button { font-size: 11.5px; padding: 3px 9px; border-radius: 6px; border: 1px solid var(--br); background: var(--sf); color: var(--t2); cursor: pointer; transition: all .15s; }
.fi-act button:hover { border-color: var(--a); color: var(--a); background: var(--a10); }
.fi-st { font-size: 11px; padding: 2px 8px; border-radius: 100px; font-weight: 500; flex-shrink: 0; }
.st-pend { background: var(--p10); color: var(--p60); }
.st-load { background: var(--ambg); color: var(--am); }
.st-done { background: var(--grbg); color: var(--gr); }
.st-err { background: var(--rdbg); color: var(--rd); }
.fi-res { background: var(--sf2); border-top: 1px solid var(--br); padding: 10px 13px; font-size: 12px; color: var(--t2); line-height: 1.65; display: none; }
.fi-res.show { display: block; }
.pbar { height: 3px; background: var(--a20); border-radius: 3px; margin-top: 6px; overflow: hidden; }
.pbar-fill { height: 100%; background: var(--a); border-radius: 3px; transition: width .4s; width: 0; }
</style>
</head>
<body>

<header class="hdr">
  <a class="logo" href="index.html"><span class="logo-dot"></span>领导力建模智能体</a>
  <nav class="prog">
    <a class="ps" href="step1.html"><div class="pd active">1</div><span class="pl active">信息采集</span></a>
    <div class="pline"></div>
    <a class="ps" href="step2.html"><div class="pd pending">2</div><span class="pl">维度确认</span></a>
    <div class="pline"></div>
    <a class="ps" href="step3.html"><div class="pd pending">3</div><span class="pl">描述建立</span></a>
    <div class="pline"></div>
    <a class="ps" href="step4.html"><div class="pd pending">4</div><span class="pl">行为锚定</span></a>
    <div class="pline"></div>
    <a class="ps" href="step5.html"><div class="pd pending">5</div><span class="pl">总览导出</span></a>
  </nav>
</header>

<div class="main">
  <div class="lcard">
    <b>信息采集阶段（M01）</b>
    <p>通过 AI 引导式对话收集企业背景、建模层级和优秀管理者画像。右侧支持上传战略文档、JD、绩效报告，AI 自动解析关键信息并融入建模上下文。</p>
  </div>
  <div class="main-inner">
    <div class="step1-grid">
      <div class="chat-pane">
        <div class="chat-ttl">
          <span class="chat-ttl-main">🤖 AI 引导对话</span>
          <span class="chat-ttl-sub" id="chat-prog">第 0 / 6 步</span>
        </div>
        <div class="chat-msgs" id="cmsgs"></div>
        <div class="chat-foot">
          <textarea class="ci" id="ci" placeholder="输入您的回答，按 Enter 发送…" rows="2" onkeydown="chatKD(event)"></textarea>
          <button class="csend" onclick="chatSend()" id="sendBtn">发送 ↑</button>
        </div>
      </div>
      <div class="right-pane" id="rpane">
        <div class="sum-card">
          <div class="sum-hd">📋 建模信息进度</div>
          <div class="sum-bd" id="sbd">
            <div style="font-size:12px;color:var(--t3);text-align:center;padding:18px 0;line-height:1.7">
              通过左侧对话采集信息后<br>摘要自动出现在这里
            </div>
          </div>
        </div>
        <div class="upload-card">
          <div class="upload-hd">📎 上传参考文档 <span>PDF · DOCX · TXT</span></div>
          <div class="dropzone" id="dz" ondragover="dzEv(event,'over')" ondragleave="dzEv(event,'leave')" ondrop="dzEv(event,'drop')">
            <input class="file-input-real" type="file" id="fInput" accept=".txt,.pdf,.docx,.md" multiple onchange="handleSel(this.files)">
            <div style="font-size:24px;margin-bottom:6px">📄</div>
            <p>拖拽文件至此，或 <b>点击选择</b></p>
            <small>战略文档 · JD · 绩效报告（支持 PDF / DOCX / TXT，最大 10 MB）</small>
          </div>
          <div class="fl" id="fl"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="ftr">
  <a href="index.html" class="btn btn-o">← 返回首页</a>
  <span class="step-info">步骤 1 / 5</span>
  <button class="btn btn-p" id="nextBtn" onclick="goNext()" disabled>确认摘要，生成维度 →</button>
</footer>

<div id="toast" class="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   STEP 1 — 信息采集 & 文档上传
   ═══════════════════════════════════════════════════════════════ */

const API = '/api';

// State
let chatMessages = []; // [{role:'ai'|'user', content}]
let chatBusy = false;
let summaryConfirmed = false;
let summaryData = null;
let collectionState = 'collecting'; // collecting | summary_ready | confirmed
let uploadFiles = []; // [{id, file, status, result}]
let docContext = [];
const CHAT_STEPS_TOTAL = 6;

// Init: load from localStorage if resuming
const saved = localStorage.getItem('lm_step1');
if (saved) {
  try {
    const p = JSON.parse(saved);
    chatMessages = p.chatMessages || [];
    summaryConfirmed = p.summaryConfirmed || false;
    summaryData = p.summaryData || null;
    collectionState = p.collectionState || (summaryConfirmed ? 'confirmed' : (summaryData ? 'summary_ready' : 'collecting'));
    docContext = p.docContext || [];
  } catch(e) {}
}

// Open question script — used as guidance for the AI
const SCRIPT_QUESTIONS = [
  "欢迎使用领导力建模智能体！🎉 我将通过几轮对话帮您梳理建模所需的企业信息。您也可以在右侧上传参考文档辅助建模，完成后自动生成摘要。请问贵公司主要做什么业务？所在行业是哪个？",
  "了解了！请问贵公司目前有多少员工？处于什么发展阶段？（快速扩张期 / 稳定经营期 / 转型调整期）",
  "明白了。贵公司今年最主要的战略重点是什么？（开拓新市场 / 数字化转型 / 提升运营效率…）",
  "好的。在管理层面，目前让您最头疼的问题是什么？（执行力参差 / 跨部门协作摩擦大…）",
  "感谢！本次建模聚焦哪个管理层级？A. 基层管理者 B. 中层管理者 C. 高层管理者 D. 自定义",
  "好的，本次建模聚焦中层管理者。在这个层级中，优秀管理者有哪些让您印象深刻的具体行为表现？（越具体越好）",
];

let chatStepIndex = 0;

function renderChat() {
  const el = document.getElementById('cmsgs');
  if (!el) return;
  el.innerHTML = chatMessages.map(m => {
    if (m.role === 'user') {
      return `<div class="msg user"><div class="bub bub-user">${escHtml(m.content)}</div></div>`;
    } else if (m.role === 'doc') {
      return `<div class="msg doc"><div class="av av-doc">📄</div><div class="bub bub-doc">${m.content}</div></div>`;
    }
    return `<div class="msg ai"><div class="av av-ai">🤖</div><div class="bub bub-ai">${formatContent(m.content)}</div></div>`;
  }).join('');
  el.scrollTop = 99999;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatContent(s) {
  return s.replace(/\n/g, '<br>');
}

function addMsg(role, content) {
  chatMessages.push({ role, content });
  renderChat();
  saveState();
}

function chatKD(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); chatSend(); }
}

async function chatSend() {
  if (chatBusy || collectionState !== 'collecting') return;
  const ci = document.getElementById('ci');
  const t = ci.value.trim(); if (!t) return;
  ci.value = '';
  addMsg('user', t);
  const userTurns = chatMessages.filter(m => m.role === 'user').length;
  const forceSummary = userTurns >= CHAT_STEPS_TOTAL;
  chatBusy = true;
  updateInteractionState();

  // Show typing indicator
  const msgsEl = document.getElementById('cmsgs');
  const typingEl = document.createElement('div');
  typingEl.className = 'msg ai'; typingEl.id = 'typing';
  typingEl.innerHTML = '<div class="av av-ai">🤖</div><div class="typing"><span></span><span></span><span></span></div>';
  msgsEl.appendChild(typingEl);
  msgsEl.scrollTop = 99999;

  try {
    // Build context string from summary
    let context = '';
    if (summaryData) {
      context = Object.entries(summaryData).map(([k,v]) => `${k}: ${v}`).join('; ');
    }

    const resp = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: chatMessages.filter(m => m.role !== 'doc'),
        context: context,
        force_summary: forceSummary
      })
    });
    const data = await resp.json();
    document.getElementById('typing')?.remove();

    if (data.error) {
      addMsg('ai', `⚠️ 出错了：${data.error}。请重试。`);
    } else {
      addMsg('ai', data.reply);
      // Try to extract summary from reply
      const summaryMatch = data.reply.match(/【摘要】([\s\S]*?)$/);
      if (summaryMatch) {
        parseSummary(summaryMatch[1]);
      }
      // Progress
      chatStepIndex = Math.min(userTurns, CHAT_STEPS_TOTAL);
      updateProg();
    }
  } catch (err) {
    document.getElementById('typing')?.remove();
    addMsg('ai', `⚠️ 网络错误：${err.message}。请检查后端是否已启动。`);
  }
  chatBusy = false;
  updateInteractionState();
}

function updateProg() {
  const el = document.getElementById('chat-prog');
  if (el) el.textContent = `第 ${Math.min(chatStepIndex, CHAT_STEPS_TOTAL)} / ${CHAT_STEPS_TOTAL} 步`;
}

function parseSummary(text) {
  const summary = {};
  const lines = text.split('\n').filter(Boolean);
  for (const line of lines) {
    const m = line.match(/^(.+?)[：:]\s*(.+)/);
    if (m) summary[m[1].trim()] = m[2].trim();
  }
  if (Object.keys(summary).length >= 4) {
    summaryData = summary;
    summaryConfirmed = false;
    collectionState = 'summary_ready';
    renderSummary();
    document.getElementById('nextBtn').disabled = true;
    updateInteractionState();
    saveState();
  }
}

function renderSummary() {
  if (!summaryData) return;
  const bd = document.getElementById('sbd');
  if (!bd) return;
  let html = Object.entries(summaryData).map(([k, v]) =>
    `<div class="sf3"><div class="sf3-l">${k}</div><div class="sf3-v">${v}</div></div>`
  ).join('');
  if (docContext.length) {
    html += `<div class="sf3" style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--br)">
      <div class="sf3-l" style="color:var(--adk)">📎 文档融入</div>
      <div class="sf3-v" style="font-size:11.5px;color:var(--t2)">${docContext.join('；')}</div>
    </div>`;
  }
  if (collectionState === 'summary_ready') {
    html += `<div class="summary-action"><button class="btn btn-p btn-sm" onclick="confirmSummary()">确认摘要</button></div>`;
  }
  bd.innerHTML = html;

  // Show confirm banner
  const rp = document.getElementById('rpane');
  const existing = rp.querySelector('.confirm-ok');
  if (existing) existing.remove();
  if (collectionState === 'summary_ready') {
    const cb = document.createElement('div');
    cb.className = 'confirm-ok confirm-pending';
    cb.innerHTML = '<span>摘要已生成，请确认后进入下一步</span><button class="btn btn-a btn-sm" onclick="confirmSummary()">确认</button>';
    rp.insertBefore(cb, rp.firstChild);
  } else if (collectionState === 'confirmed') {
    const cb = document.createElement('div');
    cb.className = 'confirm-ok';
    cb.innerHTML = '✅ 摘要已确认，点击右下角进入下一步';
    rp.insertBefore(cb, rp.firstChild);
  }
}

function confirmSummary() {
  if (!summaryData) return;
  summaryConfirmed = true;
  collectionState = 'confirmed';
  localStorage.setItem('lm_company_info', JSON.stringify(summaryData));
  document.getElementById('nextBtn').disabled = false;
  renderSummary();
  updateInteractionState();
  saveState();
}

function goNext() {
  if (!summaryConfirmed || collectionState !== 'confirmed') return;
  saveState();
  window.location.href = 'step2.html';
}

/* ── File Upload ─────────────────────────────────────────────── */

function dzEv(e, t) {
  e.preventDefault(); e.stopPropagation();
  const dz = document.getElementById('dz');
  if (t === 'over') dz.classList.add('over');
  else if (t === 'leave') dz.classList.remove('over');
  else { dz.classList.remove('over'); handleFiles(e.dataTransfer.files); }
}
function handleSel(files) { handleFiles(files); }

function handleFiles(files) {
  Array.from(files).forEach(f => {
    if (f.size > 10 * 1024 * 1024) { showToast(`${f.name} 超过 10MB`, true); return; }
    const id = 'f' + Date.now() + Math.random().toString(36).slice(2, 6);
    uploadFiles.push({ id, file: f, status: 'pending', result: null });
  });
  renderFileList();
}

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function fIcon(n) {
  if (/\.pdf$/i.test(n)) return '📕';
  if (/\.docx?$/i.test(n)) return '📘';
  return '📄';
}
function stCls(s) { return {pending:'st-pend', loading:'st-load', done:'st-done', error:'st-err'}[s]; }
function stLbl(s) { return {pending:'待解析', loading:'解析中…', done:'✓ 完成', error:'解析失败'}[s]; }

function renderFileList() {
  const fl = document.getElementById('fl'); if (!fl) return;
  fl.innerHTML = uploadFiles.map(rec => {
    const f = rec.file;
    let actions = '';
    if (rec.status === 'pending' || rec.status === 'error') {
      actions = `<button onclick="analyzeFile('${rec.id}')">🔍 AI 解析</button><button onclick="removeFile('${rec.id}')">删除</button>`;
    } else if (rec.status === 'loading') {
      actions = `<div class="pbar"><div class="pbar-fill" id="pb_${rec.id}" style="width:25%"></div></div>`;
    } else if (rec.status === 'done') {
      actions = `<button onclick="toggleResult('${rec.id}')">查看结果 ↕</button><button onclick="removeFile('${rec.id}')">删除</button>`;
    }
    const resHtml = rec.result ? `<div class="fi-res" id="res_${rec.id}">${formatAnalysis(rec.result)}</div>` : '';
    return `<div class="fi" id="fi_${rec.id}">
      <span class="fi-ico">${fIcon(f.name)}</span>
      <div class="fi-info">
        <div class="fi-name" title="${f.name}">${f.name}</div>
        <div class="fi-meta">${fmtSize(f.size)}</div>
        <div class="fi-act">${actions}</div>
      </div>
      <span class="fi-st ${stCls(rec.status)}">${stLbl(rec.status)}</span>
    </div>${resHtml}`;
  }).join('');
}

function removeFile(id) {
  uploadFiles = uploadFiles.filter(r => r.id !== id);
  document.getElementById('fi_' + id)?.remove();
  document.getElementById('res_' + id)?.remove();
}

function toggleResult(id) {
  document.getElementById('res_' + id)?.classList.toggle('show');
}

function formatAnalysis(text) {
  let html = '<div style="font-size:12px;font-weight:600;color:var(--adk);margin-bottom:8px">📊 文档解析结果</div>';
  const parts = text.split(/【(.+?)】/).filter(Boolean);
  if (parts.length > 1) {
    for (let i = 0; i < parts.length; i += 2) {
      html += `<div style="margin-bottom:9px">
        <div style="font-size:11px;font-weight:600;color:var(--p80);margin-bottom:3px">【${parts[i]}】</div>
        <div style="font-size:12px;color:var(--t2);line-height:1.65">${(parts[i+1]||'').trim()}</div>
      </div>`;
    }
  } else {
    html += `<div style="font-size:12px;color:var(--t2);line-height:1.65">${text.replace(/\n/g,'<br>')}</div>`;
  }
  return html;
}

async function analyzeFile(id) {
  const rec = uploadFiles.find(r => r.id === id); if (!rec) return;
  rec.status = 'loading'; renderFileList();

  let pct = 20;
  const iv = setInterval(() => {
    pct = Math.min(pct + 7, 85);
    const pb = document.getElementById('pb_' + id);
    if (pb) pb.style.width = pct + '%';
  }, 350);

  try {
    const formData = new FormData();
    formData.append('file', rec.file, rec.file.name);
    const resp = await fetch(`${API}/analyze-doc`, { method: 'POST', body: formData });
    const data = await resp.json();
    clearInterval(iv);

    if (data.error) throw new Error(data.error);
    rec.result = data.result; rec.status = 'done';

    const kwMatch = data.result.match(/【战略关键词】[：:]\s*(.{0,80})/);
    if (kwMatch) docContext.push(kwMatch[1].split(/[，,]/)[0].trim());

    renderFileList();
    toggleResult(id);
    addMsg('doc', `📄 <strong>${rec.file.name}</strong> 已解析完成，关键信息已注入建模上下文。`);
    showToast(`${rec.file.name} 解析完成`);
  } catch (err) {
    clearInterval(iv);
    rec.status = 'error'; renderFileList();
    addMsg('ai', `⚠️ 解析 <strong>${rec.file.name}</strong> 时遇到问题：${err.message}`);
    showToast('解析失败：' + (err.message || '未知错误'), true);
  }
}

/* ── Persistence ─────────────────────────────────────────────── */

function saveState() {
  localStorage.setItem('lm_step1', JSON.stringify({
    chatMessages, summaryConfirmed, summaryData, collectionState, docContext
  }));
}

function updateInteractionState() {
  const ci = document.getElementById('ci');
  const sendBtn = document.getElementById('sendBtn');
  const locked = collectionState !== 'collecting';
  if (ci) {
    ci.disabled = true;
    ci.disabled = locked || chatBusy;
    ci.placeholder = collectionState === 'confirmed' ? '摘要已确认' : (collectionState === 'summary_ready' ? '请先确认右侧摘要' : '输入您的回答，按 Enter 发送…');
  }
  if (sendBtn) {
    sendBtn.disabled = true;
    sendBtn.disabled = locked || chatBusy;
  }
}

/* ── Toast ───────────────────────────────────────────────────── */

function showToast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? '#991B1B' : '#1A1520';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

/* ── Init ────────────────────────────────────────────────────── */

function init() {
  if (chatMessages.length === 0) {
    // Start with a brief welcome then let the first user message drive the AI
    addMsg('ai', SCRIPT_QUESTIONS[0]);
  } else {
    renderChat();
  }
  renderFileList();
  if (summaryData) {
    renderSummary();
    document.getElementById('nextBtn').disabled = collectionState !== 'confirmed';
  }
  updateProg();
  updateInteractionState();
}

init();
</script>
