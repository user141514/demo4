<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录 - 领导力建模智能体</title>
<link rel="stylesheet" href="style.css">
<style>
.auth-container {
  max-width: 400px; margin: 60px auto 0; padding: 0 16px;
}
.auth-card {
  background: var(--sf); border-radius: 14px; border: 1px solid var(--br);
  box-shadow: var(--sh); padding: 32px 28px;
}
.auth-card h2 {
  font-size: 20px; font-weight: 700; color: var(--t1); margin-bottom: 6px; text-align: center;
}
.auth-card .subtitle {
  font-size: 13px; color: var(--t3); text-align: center; margin-bottom: 24px;
}
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12.5px; font-weight: 500; color: var(--t2); margin-bottom: 5px; }
.form-group input {
  width: 100%; border: 1.5px solid var(--br); border-radius: 8px; padding: 10px 12px;
  font-size: 14px; font-family: inherit; outline: none; color: var(--t1);
  transition: border-color .15s; background: var(--sf);
}
.form-group input:focus { border-color: var(--p); box-shadow: 0 0 0 3px var(--p10); }
.error-msg {
  background: var(--rdbg); color: var(--rd); padding: 10px 13px; border-radius: 8px;
  font-size: 13px; margin-bottom: 14px; display: none;
}
.submit-btn {
  width: 100%; padding: 11px; background: var(--p); color: #fff; border: none;
  border-radius: 8px; font-size: 14.5px; font-weight: 600; cursor: pointer;
  transition: background .15s; font-family: inherit; margin-top: 6px;
}
.submit-btn:hover { background: var(--p80); }
.submit-btn:disabled { opacity: .5; cursor: not-allowed; }
.switch-link {
  text-align: center; margin-top: 16px; font-size: 13px; color: var(--t2);
}
.switch-link a { color: var(--p); cursor: pointer; text-decoration: underline; font-weight: 500; }
.back-link { text-align: center; margin-top: 20px; }
</style>
</head>
<body>

<header class="hdr">
  <a class="logo" href="index.html"><span class="logo-dot"></span>领导力建模智能体</a>
  <nav class="prog"></nav>
</header>

<div class="main">
  <div class="auth-container">
    <div class="auth-card">
      <h2 id="authTitle">登录</h2>
      <p class="subtitle" id="authSubtitle">登录以保存您的建模记录</p>

      <div class="error-msg" id="errorMsg"></div>

      <form id="authForm" onsubmit="handleSubmit(event)">
        <div class="form-group" id="nameGroup" style="display:none">
          <label>姓名</label>
          <input type="text" id="nameInput" placeholder="您的姓名" autocomplete="name">
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="emailInput" placeholder="your@email.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="passwordInput" placeholder="至少6位密码" autocomplete="current-password" required minlength="6">
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">登录</button>
      </form>

      <div class="switch-link">
        <span id="switchText">还没有账号？</span> <a id="switchLink" onclick="toggleMode()">立即注册</a>
      </div>
    </div>
    <div class="back-link">
      <a href="index.html" class="btn btn-o">← 返回首页</a>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const API = '/api';
let isRegister = false;

function toggleMode() {
  isRegister = !isRegister;
  document.getElementById('authTitle').textContent = isRegister ? '注册' : '登录';
  document.getElementById('authSubtitle').textContent = isRegister ? '创建账号以保存建模记录' : '登录以查看您的建模记录';
  document.getElementById('nameGroup').style.display = isRegister ? 'block' : 'none';
  document.getElementById('submitBtn').textContent = isRegister ? '注册' : '登录';
  document.getElementById('switchText').textContent = isRegister ? '已有账号？' : '还没有账号？';
  document.getElementById('switchLink').textContent = isRegister ? '去登录' : '立即注册';
  document.getElementById('errorMsg').style.display = 'none';
}

async function handleSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const errorEl = document.getElementById('errorMsg');
  btn.disabled = true;
  errorEl.style.display = 'none';

  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const display_name = document.getElementById('nameInput').value.trim();

  const endpoint = isRegister ? 'register' : 'login';
  const body = { email, password };
  if (isRegister) body.display_name = display_name;

  try {
    const resp = await fetch(`${API}/auth/${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await resp.json();
    if (!resp.ok) {
      errorEl.textContent = data.message || '操作失败';
      errorEl.style.display = 'block';
    } else {
      showToast(isRegister ? '注册成功！' : '登录成功！');
      // 保存用户信息
      if (data.user) {
        localStorage.setItem('lm_user', JSON.stringify(data.user));
      }
      setTimeout(() => { window.location.href = 'index.html'; }, 500);
    }
  } catch (err) {
    errorEl.textContent = '网络错误，请检查后端是否启动';
    errorEl.style.display = 'block';
  }
  btn.disabled = false;
}

// 检查是否已登录
(async () => {
  try {
    const resp = await fetch(`${API}/auth/me`);
    const data = await resp.json();
    if (data.user) {
      localStorage.setItem('lm_user', JSON.stringify(data.user));
      window.location.href = 'index.html';
    }
  } catch(e) {}
})();

function showToast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? '#991B1B' : '#1A1520';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
