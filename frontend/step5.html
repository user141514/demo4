<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>总览导出 - 领导力建模智能体</title>
<link rel="stylesheet" href="style.css">
<style>
.done-banner {
  background: linear-gradient(135deg, var(--pdk) 0%, var(--p) 55%, var(--p60) 100%);
  border-radius: 14px; padding: 24px 28px; color: #fff; margin-bottom: 22px;
  display: flex; align-items: center; justify-content: space-between; gap: 20px;
}
.done-banner h2 { font-size: 22px; font-weight: 700; margin-bottom: 5px; }
.done-banner p { font-size: 14px; opacity: .85; line-height: 1.6; }
.export-btns { display: flex; gap: 10px; flex-shrink: 0; flex-wrap: wrap; }
.btn-word { background: #fff; color: var(--p); border: none; padding: 10px 20px; border-radius: 9px; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: all .15s; font-family: inherit; }
.btn-word:hover { background: var(--p10); }
.btn-pdf { background: rgba(255,255,255,.2); color: #fff; border: 1.5px solid rgba(255,255,255,.5); padding: 10px 20px; border-radius: 9px; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: all .15s; font-family: inherit; }
.btn-pdf:hover { background: rgba(255,255,255,.3); }
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 22px; }
.stat-card { background: var(--sf); border-radius: 11px; border: 1px solid var(--br); padding: 16px 20px; text-align: center; box-shadow: var(--sh); }
.stat-num { font-size: 30px; font-weight: 700; color: var(--p); line-height: 1.1; }
.stat-lbl { font-size: 12px; color: var(--t2); margin-top: 5px; font-weight: 500; }
.ov-list { display: flex; flex-direction: column; gap: 11px; }
.ov-item { background: var(--sf); border-radius: 12px; border: 1.5px solid var(--br); box-shadow: var(--sh); overflow: hidden; }
.ov-hd { padding: 14px 18px; display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
.ov-hd:hover { background: var(--sf2); }
.ov-num { width: 26px; height: 26px; border-radius: 50%; background: var(--p10); color: var(--p80); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ov-nm { font-size: 14.5px; font-weight: 600; flex: 1; color: var(--t1); }
.ov-chev { font-size: 12px; color: var(--t3); transition: transform .2s; }
.ov-chev.open { transform: rotate(90deg); }
.ov-bd { display: none; padding: 0 18px 18px; border-top: 1px solid var(--br); }
.ov-bd.open { display: block; }
.ov-desc { font-size: 13.5px; color: var(--t2); line-height: 1.75; padding: 14px 0 12px; }
.beh-section { margin-bottom: 14px; }
.beh-section:last-child { margin-bottom: 0; }
.beh-lbl { font-size: 12px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.beh-item { font-size: 13px; line-height: 1.65; padding: 7px 11px; border-radius: 8px; margin-bottom: 5px; border-left: 2.5px solid; }
.beh-ex { background: var(--grbg); border-color: var(--gr); color: #1A3025; }
.beh-st { background: var(--p10); border-color: var(--p); color: var(--pdk); }
.beh-bl { background: var(--rdbg); border-color: var(--rd); color: #3B1010; }
.framework-viz { display: grid; grid-template-columns: minmax(180px,1fr) minmax(320px,480px) minmax(180px,1fr); gap: 16px; align-items: center; margin-bottom: 22px; }
.dim-side { display: flex; flex-direction: column; gap: 9px; }
.dim-side-title { font-size: 12px; font-weight: 700; color: var(--p80); margin-bottom: 2px; padding-left: 2px; }
.dim-pill { background: var(--sf); border: 1px solid var(--br); border-radius: 8px; padding: 9px 11px; box-shadow: var(--sh); cursor: pointer; transition: all .15s; }
.dim-pill:hover { border-color: var(--p); background: var(--p10); }
.dim-pill.active { border-color: var(--p); background: var(--p10); box-shadow: 0 0 0 3px var(--p10); }
.framework-hint { margin: -10px 0 20px; font-size: 12.5px; color: var(--t2); text-align: center; }
.dim-pill-nm { font-size: 13px; font-weight: 600; color: var(--t1); }
.dim-pill-src { font-size: 11px; color: var(--t3); margin-top: 2px; }
.radar-wrap { max-width: 480px; margin: 0 auto; padding: 16px; background: var(--sf); border-radius: 12px; border: 1px solid var(--br); box-shadow: var(--sh); }
.framework-title { text-align: center; font-size: 14px; font-weight: 700; color: var(--p80); margin-bottom: 8px; }
.radar-wrap canvas { max-height: 400px; }
.radar-fallback { text-align: center; padding: 24px; }
.radar-fallback table { width: 100%; border-collapse: collapse; font-size: 13px; }
.radar-fallback th { background: var(--p10); padding: 10px 14px; text-align: left; font-weight: 600; color: var(--p80); border-bottom: 2px solid #E8D4E8; }
.radar-fallback td { padding: 9px 14px; border-bottom: 1px solid var(--br); color: var(--t1); }
.radar-fallback tr:hover td { background: #FAF7FB; }
@keyframes highlightPulse {
  0% { box-shadow: 0 0 0 0 rgba(108,33,109,.4); }
  50% { box-shadow: 0 0 0 8px rgba(108,33,109,.1); }
  100% { box-shadow: 0 0 0 0 rgba(108,33,109,0); }
}
.ov-item.highlight { animation: highlightPulse 1.5s ease-out; border-color: var(--p); }
@media (max-width: 900px) {
  .framework-viz { grid-template-columns: 1fr; }
  .dim-side { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<header class="hdr">
  <a class="logo" href="index.html"><span class="logo-dot"></span>领导力建模智能体</a>
  <nav class="prog">
    <a class="ps" href="step1.html"><div class="pd done">✓</div><span class="pl">信息采集</span></a><div class="pline done"></div>
    <a class="ps" href="step2.html"><div class="pd done">✓</div><span class="pl">维度确认</span></a><div class="pline done"></div>
    <a class="ps" href="step3.html"><div class="pd done">✓</div><span class="pl">描述建立</span></a><div class="pline done"></div>
    <a class="ps" href="step4.html"><div class="pd done">✓</div><span class="pl">行为锚定</span></a><div class="pline done"></div>
    <a class="ps" href="step5.html"><div class="pd active">5</div><span class="pl active">总览导出</span></a>
  </nav>
</header>
<div class="step-bar">
  <div class="step-bar-track"><div class="step-bar-fill" style="width:100%"></div></div>
  <span class="step-bar-label">步骤 5 / 5</span>
</div>


<div class="main">
  <div class="lcard">
    <b>总览与导出（M05）— 最终交付</b>
    <p>领导力模型构建完成。以下展示完整的维度-描述-行为锚定体系，您可以查看各维度详情、导出 Word/PDF 文档，或返回修改。</p>
  </div>

  <div id="contentArea">
    <div class="done-banner">
      <div>
        <h2>🏆 领导力模型构建完成！</h2>
        <p id="bannerSub">中层管理者领导力模型 · 模型就绪</p>
      </div>
      <div class="export-btns">
        <button class="btn-word" onclick="doExport('word')">⬇ 导出 Word</button>
        <button class="btn-pdf" onclick="doExport('pdf')">⬇ 导出 PDF</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="statDims">—</div><div class="stat-lbl">领导力维度</div></div>
      <div class="stat-card"><div class="stat-num" id="statBehs">—</div><div class="stat-lbl">行为锚定描述</div></div>
      <div class="stat-card"><div class="stat-num" id="statSources">—</div><div class="stat-lbl">来源标签类型</div></div>
      <div class="stat-card"><div class="stat-num" id="statTime">—</div><div class="stat-lbl">完成时间</div></div>
    </div>

    <div class="framework-viz">
      <div class="dim-side left" id="dimSideLeft"></div>
      <div class="radar-wrap" id="radarArea">
        <div class="framework-title">模型维度框架图</div>
        <canvas id="radarChart" style="display:none;"></canvas>
        <div class="radar-fallback" id="radarFallback" style="display:none;"></div>
      </div>
      <div class="dim-side right" id="dimSideRight"></div>
    </div>
    <div class="framework-hint">左右两侧列出全部维度，点击任一维度可在下方展开对应描述和行为锚定。</div>

    <div class="sec-row">
      <div class="sec-t">完整模型总览</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-o btn-sm" onclick="expandAll()">全部展开</button>
        <button class="btn btn-o btn-sm" onclick="collapseAll()">全部收起</button>
      </div>
    </div>
    <div class="ov-list" id="ovList"></div>

    <div style="margin-top:28px;text-align:center;padding:20px;background:var(--sf);border-radius:12px;border:1px solid var(--br)">
      <p style="font-size:13.5px;color:var(--t2);margin-bottom:14px">需要为其他管理层级建模，或重新构建？</p>
      <a href="index.html" class="btn btn-o">← 返回首页</a>
      <button class="btn btn-p" style="margin-left:10px" onclick="restart()">重新建模</button>
    </div>
  </div>
</div>

<footer class="ftr">
  <a href="step4.html" class="btn btn-o">← 上一步</a>
  <span class="step-info">步骤 5 / 5</span>
  <button class="btn btn-p" onclick="restart()">完成 ✓</button>
</footer>

<div id="toast" class="toast"></div>

<script>
const API = '/api';
const savedDims = localStorage.getItem('lm_dims');
const dims = savedDims ? JSON.parse(savedDims) : [];
const savedDescs = localStorage.getItem('lm_descs');
const descs = savedDescs ? JSON.parse(savedDescs) : [];
const savedAnchors = localStorage.getItem('lm_anchors');
const anchors = savedAnchors ? JSON.parse(savedAnchors) : [];

let openMap = {};
let selectedDimId = dims[0]?.id || null;
let radarChartInstance = null;

function init() {
  if (dims.length === 0) {
    document.getElementById('contentArea').innerHTML = `
      <div style="text-align:center;padding:60px 20px">
        <div style="font-size:48px;margin-bottom:16px">📋</div>
        <h2 style="color:var(--t2);margin-bottom:8px">暂无模型数据</h2>
        <p style="color:var(--t3);margin-bottom:20px">请先完成前面的步骤</p>
        <a href="step1.html" class="btn btn-p btn-lg">开始建模 →</a>
      </div>`;
    return;
  }

  // Build merged data
  const data = dims.map(d => {
    const desc = descs.find(dd => dd.id === d.id);
    const anc = anchors.find(a => a.id === d.id);
    return {
      id: d.id, nm: d.nm,
      desc: desc ? desc.desc : '',
      bars5: anc ? (anc.bars5 || []) : [],
      positive_behaviors: anc ? (anc.positive_behaviors || []) : [],
      negative_behaviors: anc ? (anc.negative_behaviors || []) : [],
      evidence_event: anc ? (anc.evidence_event || '') : '',
      ex: anc ? (anc.ex || []) : [],
      st: anc ? (anc.st || []) : [],
      bl: anc ? (anc.bl || []) : []
    };
  });

  const totalBehs = data.reduce((n, d) => n + (d.bars5?.length || d.ex.length + d.st.length + d.bl.length) + (d.positive_behaviors?.length || 0) + (d.negative_behaviors?.length || 0), 0);
  const sourceCount = new Set(dims.map(d => dimSourceType(d))).size;
  const now = new Date();
  const timeStr = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');

  document.getElementById('bannerSub').textContent = `中层管理者领导力模型 · ${dims.length} 个维度 · ${totalBehs} 条行为锚定`;
  document.getElementById('statDims').textContent = dims.length;
  document.getElementById('statBehs').textContent = totalBehs;
  document.getElementById('statSources').textContent = sourceCount;
  document.getElementById('statTime').textContent = timeStr;

  // Render overview items
  document.getElementById('ovList').innerHTML = data.map((d, i) => {
    const isOpen = openMap[d.id] || false;
    return `<div class="ov-item" data-dim="${d.id}">
      <div class="ov-hd" onclick="togOv('${d.id}')">
        <div class="ov-num">${i + 1}</div>
        <div class="ov-nm">${d.nm}</div>
        <span class="ov-chev ${isOpen?'open':''}">▶</span>
      </div>
      <div class="ov-bd ${isOpen?'open':''}">
        ${d.desc ? `<div class="ov-desc">${d.desc}</div>` : ''}
        ${d.evidence_event ? `<div class="ov-desc" style="padding-top:0;color:var(--t3)">关键事件来源：${d.evidence_event}</div>` : ''}
        ${renderBarsOverview(d)}
        ${renderContrastOverview(d)}
      </div>
    </div>`;
  }).join('');

  // 渲染模型维度框架图
  setTimeout(() => renderFramework(data), 100);
}

function togOv(id) { openMap[id] = !openMap[id]; init(); }
function expandAll() { dims.forEach(d => openMap[d.id] = true); init(); }
function collapseAll() { openMap = {}; init(); }

async function doExport(type) {
  // Build model data
  const companyInfo = JSON.parse(localStorage.getItem('lm_company_info') || '{}');
  const model = {
    context: companyInfo,
    dimensions: dims,
    descriptions: descs,
    anchors: anchors,
    date: new Date().toISOString().slice(0, 10),
  };

  if (type === 'docx' || type === 'word') {
    try {
      showToast('正在生成 Word 文档…');
      const resp = await fetch(`${API}/export`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ format: 'docx', model }),
      });
      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.error || '导出失败');
      }
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `领导力模型_${new Date().toISOString().slice(0,10)}.docx`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('Word 文档已下载');
    } catch (err) {
      console.error('DOCX export failed:', err);
      showToast(`Word导出失败: ${err.message}`, true);
    }
  } else if (type === 'pdf') {
    try {
      showToast('正在生成 PDF 文档…');
      const resp = await fetch(`${API}/export`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ format: 'pdf', model }),
      });
      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.error || '导出失败');
      }
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `领导力模型_${new Date().toISOString().slice(0,10)}.pdf`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('PDF 文档已下载');
    } catch (err) {
      console.error('PDF export failed:', err);
      showToast(`PDF导出失败: ${err.message}`, true);
    }
  } else {
    doMarkdownExport(model);
  }
}

function doMarkdownExport(model) {
  const { context, dimensions, descriptions, anchors } = model;
  let md = `# ${context['行业/业务'] || '企业'} 领导力模型\n\n`;
  md += `> 生成时间：${new Date().toLocaleString()}\n\n`;
  md += `## 模型概览\n\n`;
  md += `- 维度数量：${dimensions.length}\n`;
  md += `- 建模层级：${context['建模层级'] || '中层管理者'}\n\n`;

  dimensions.forEach((d, i) => {
    const desc = descriptions.find(dd => dd.id === d.id);
    const anc = anchors.find(a => a.id === d.id);
    md += `## ${i + 1}. ${d.nm}\n\n`;
    if (desc && desc.desc) md += `**定位描述**：${desc.desc}\n\n`;
    if (anc) {
      if (anc.ex && anc.ex.length) { md += `### ⭐ 优秀水平\n\n${anc.ex.map(t => `- ${t}`).join('\n')}\n\n`; }
      if (anc.st && anc.st.length) { md += `### ✅ 达标水平\n\n${anc.st.map(t => `- ${t}`).join('\n')}\n\n`; }
      if (anc.bl && anc.bl.length) { md += `### ⚠️ 不达标\n\n${anc.bl.map(t => `- ${t}`).join('\n')}\n\n`; }
    }
  });

  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `领导力模型_${new Date().toISOString().slice(0,10)}.md`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Markdown 文件已下载');
}

function dimSourceType(dim) {
  return dim.source_type || dim.sources?.type || (dim.id && dim.id.startsWith('LN-') ? '标准库映射' : '对话归纳');
}
function renderBarsOverview(d) {
  const bars = d.bars5 && d.bars5.length ? d.bars5 : [];
  if (!bars.length) {
    return `${d.ex.length ? `<div class="beh-section"><div class="beh-lbl" style="color:var(--gr)">⭐ 卓越/优秀表现</div>${d.ex.map(t => `<div class="beh-item beh-ex">${t}</div>`).join('')}</div>` : ''}${d.st.length ? `<div class="beh-section"><div class="beh-lbl" style="color:var(--p80)">✅ 符合预期</div>${d.st.map(t => `<div class="beh-item beh-st">${t}</div>`).join('')}</div>` : ''}${d.bl.length ? `<div class="beh-section"><div class="beh-lbl" style="color:var(--rd)">⚠️ 不符合</div>${d.bl.map(t => `<div class="beh-item beh-bl">${t}</div>`).join('')}</div>` : ''}`;
  }
  return `<div class="beh-section"><div class="beh-lbl" style="color:var(--p80)">BARS 五级行为描述</div>${bars.map(row => `<div class="beh-item beh-st"><strong>${row.level}</strong>：${row.text}</div>`).join('')}</div>`;
}
function renderContrastOverview(d) {
  const pos = d.positive_behaviors || [];
  const neg = d.negative_behaviors || [];
  if (!pos.length && !neg.length) return '';
  return `<div class="beh-section"><div class="beh-lbl" style="color:var(--gr)">正负向行为对照</div>${pos.map(t => `<div class="beh-item beh-ex">正向：${t}</div>`).join('')}${neg.map(t => `<div class="beh-item beh-bl">负向：${t}</div>`).join('')}</div>`;
}

function dimSourceLabel(dim) {
  const type = dimSourceType(dim);
  const detail = dim.source_detail || dim.sources?.detail || dim.sources?.framework || dim.sources?.strategy || dim.sources?.interview || '';
  if (type === '标准库映射') {
    const fw = dim.framework_name || dim.sources?.framework || detail;
    const fd = dim.framework_dimension || dim.nm || dim.name || '';
    return `${type} · ${fd}${fw ? ' · ' + fw : ''}`;
  }
  return `${type}${detail ? ' · ' + detail : ''}`;
}

function renderFramework(data) {
  const left = document.getElementById('dimSideLeft');
  const right = document.getElementById('dimSideRight');
  const midpoint = Math.ceil(data.length / 2);
  if (!selectedDimId && data.length) selectedDimId = data[0].id;
  const buildPills = (items, title) => `<div class="dim-side-title">${title}</div>` + items.map(d => {
    const dim = dims.find(dd => dd.id === d.id) || d;
    return `<div class="dim-pill ${selectedDimId === d.id ? 'active' : ''}" onclick="focusDim('${d.id}')">
      <div class="dim-pill-nm">${d.nm}</div>
      <div class="dim-pill-src">${dimSourceLabel(dim)}</div>
    </div>`;
  }).join('');
  if (left) left.innerHTML = buildPills(data.slice(0, midpoint), `左侧维度（${data.slice(0, midpoint).length}个）`);
  if (right) right.innerHTML = buildPills(data.slice(midpoint), `右侧维度（${data.slice(midpoint).length}个）`);
  renderRadar(data);
}

function renderRadar(data) {
  if (typeof Chart === 'undefined') {
    const fallback = document.getElementById('radarFallback');
    if (fallback) {
      fallback.style.display = 'block';
      fallback.innerHTML = buildFallbackTable(data);
    }
    return;
  }

  const canvas = document.getElementById('radarChart');
  if (!canvas) return;
  canvas.style.display = 'block';

  const ctx = canvas.getContext('2d');
  if (radarChartInstance) radarChartInstance.destroy();
  radarChartInstance = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: data.map(d => d.nm),
      datasets: [{
        label: '模型维度',
        data: data.map(() => 1),
        backgroundColor: 'rgba(108,33,109,0.12)',
        borderColor: '#6C216D',
        borderWidth: 2,
        pointBackgroundColor: '#6C216D',
        pointBorderColor: '#fff',
        pointBorderWidth: 2,
        pointRadius: 5,
        pointHoverRadius: 8,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      scales: {
        r: {
          beginAtZero: true,
          max: 1.2,
          min: 0,
          ticks: { display: false },
          grid: { color: 'rgba(108,33,109,0.08)' },
          angleLines: { color: 'rgba(108,33,109,0.08)' },
          pointLabels: { font: { size: 13, family: "'PingFang SC','Microsoft YaHei',sans-serif" }, color: '#1A1520' }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              const d = data[ctx.dataIndex];
              const dim = d ? (dims.find(dd => dd.id === d.id) || d) : null;
              return d ? `${d.nm}: ${dimSourceLabel(dim)} · ${(d.desc || '').slice(0, 36)}` : '';
            }
          }
        }
      },
      onClick: function(e, elements) {
        if (elements.length > 0) {
          const idx = elements[0].index;
          const d = data[idx];
          if (!d) return;

          focusDim(d.id);
        }
      }
    }
  });
}

function focusDim(id) {
  selectedDimId = id;
  openMap[id] = true;
  init();
  setTimeout(() => {
    const target = document.querySelector(`[data-dim="${id}"]`);
    if (target) {
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      target.classList.add('highlight');
      setTimeout(() => target.classList.remove('highlight'), 1500);
    }
  }, 150);
}

function buildFallbackTable(data) {
  let html = '<div style="font-size:14px;font-weight:600;margin-bottom:12px;color:var(--t1)">模型维度框架图</div>';
  html += '<table><thead><tr><th>维度</th><th>来源</th><th>定位摘要</th></tr></thead><tbody>';
  data.forEach(d => {
    const dim = dims.find(dd => dd.id === d.id) || d;
    html += `<tr><td><strong>${d.nm}</strong></td><td>${dimSourceLabel(dim)}</td><td style="font-size:12px;color:var(--t2)">${(d.desc || '').slice(0,60)}…</td></tr>`;
  });
  html += '</tbody></table>';
  return html;
}

function restart() {
  localStorage.clear();
  window.location.href = 'step1.html';
}

function showToast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = err ? '#991B1B' : '#1A1520';
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2800);
}

async function requireStudent(){
  try {
    const resp = await fetch(`${API}/auth/me`);
    const data = await resp.json();
    if (!data.user) { window.location.href='login.html'; return false; }
    if (data.user.role === 'instructor') { window.location.href='teacher.html'; return false; }
    localStorage.setItem('lm_user', JSON.stringify(data.user));
    return true;
  } catch(e) {
    window.location.href='login.html';
    return false;
  }
}

requireStudent().then(ok => { if (ok) init(); });
</script>
