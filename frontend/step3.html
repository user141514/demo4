<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>描述建立 - 领导力建模智能体</title>
<link rel="stylesheet" href="style.css">
<style>
.desc-list { display: flex; flex-direction: column; gap: 12px; }
.di { background: var(--sf); border-radius: 12px; border: 1.5px solid var(--br); box-shadow: var(--sh); overflow: hidden; }
.di-hd { padding: 13px 16px 10px; display: flex; align-items: center; gap: 10px; }
.di-nm { font-size: 14px; font-weight: 600; flex: 1; color: var(--t1); display: flex; align-items: center; gap: 8px; }
.di-nm::before { content: ""; width: 3px; height: 16px; border-radius: 2px; background: var(--p); flex-shrink: 0; }
.di-txt { padding: 0 16px 12px; font-size: 13.5px; color: var(--t1); line-height: 1.75; }
.di-issue { padding: 8px 16px; font-size: 12.5px; background: #FFFBEB; border-top: 1px solid #FDE68A; color: #92400E; }
.di-ft { padding: 9px 16px; border-top: 1px solid var(--br); display: flex; gap: 8px; background: var(--sf2); }
.regen-row { padding: 0 16px 12px; display: flex; gap: 8px; }
.regen-row input { flex: 1; border: 1.5px solid var(--br); border-radius: 8px; padding: 8px 12px; font-size: 13px; font-family: inherit; outline: none; color: var(--t1); }
.regen-row input:focus { border-color: var(--a); box-shadow: 0 0 0 3px var(--a10); }
.regen-btn { background: var(--a); color: #fff; border: none; border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 13px; font-weight: 500; white-space: nowrap; }
.regen-btn:hover { background: var(--a60); }
.term-card { background: var(--sf); border: 1px solid var(--br); border-radius: 12px; box-shadow: var(--sh); padding: 14px 16px; margin-bottom: 16px; display:flex; justify-content:space-between; align-items:center; gap:12px; }
.term-card p { font-size: 12.5px; color: var(--t2); line-height: 1.6; }
.term-chip { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:100px; background:var(--p10); color:var(--p80); font-size:12px; margin:3px 4px 0 0; }
</style>
</head>
<body>

<header class="hdr">
  <a class="logo" href="index.html"><span class="logo-dot"></span>领导力建模智能体</a>
  <nav class="prog">
    <a class="ps" href="step1.html"><div class="pd done">✓</div><span class="pl">信息采集</span></a><div class="pline done"></div>
    <a class="ps" href="step2.html"><div class="pd done">✓</div><span class="pl">维度确认</span></a><div class="pline done"></div>
    <a class="ps" href="step3.html"><div class="pd active">3</div><span class="pl active">描述建立</span></a><div class="pline"></div>
    <a class="ps" href="step4.html"><div class="pd pending">4</div><span class="pl">行为锚定</span></a><div class="pline"></div>
    <a class="ps" href="step5.html"><div class="pd pending">5</div><span class="pl">总览导出</span></a>
  </nav>
</header>
<div class="step-bar"><div class="step-bar-track"><div class="step-bar-fill" style="width:60%"></div></div><span class="step-bar-label">步骤 3 / 5</span></div>

<div class="main">
  <div class="lcard"><b>维度描述建立（M03）</b><p>录入企业专有词汇后，系统会根据内部关键词更新维度定位描述；需要调整时，填写修改方向并重新生成表述。</p></div>
  <div class="term-card"><div><b style="color:var(--p80);font-size:13px">企业专有词汇</b><p id="termPreview">尚未录入。可加入公司内部称谓、业务线名称、管理机制、文化关键词等。</p></div><button class="btn btn-a btn-sm" onclick="openTerms()">＋ 企业专有词汇</button></div>
  <div id="loadingArea" class="ldg"><div style="font-size:32px;margin-bottom:8px">✨</div><div class="ldots"><span></span><span></span><span></span></div><div style="font-size:13.5px;margin-top:4px">AI 正在生成维度定位描述…</div></div>
  <div id="contentArea" class="hidden"><div class="sec-row"><div class="sec-t">维度定位描述</div><div class="sec-s">仅展示需审阅问题；不再展示通过状态标签</div></div><div class="desc-list" id="descList"></div></div>
</div>

<footer class="ftr"><a href="step2.html" class="btn btn-o">← 上一步</a><span class="step-info">步骤 3 / 5</span><button class="btn btn-p" id="nextBtn" onclick="goNext()">确认描述，进入关键事件采集 →</button></footer>

<div class="modal-bg" id="termModal"><div class="modal-box"><div class="modal-hd"><span>企业专有词汇</span><button class="modal-x" onclick="closeTerms()">×</button></div><div class="ff"><label>词汇/短语（用逗号、顿号或换行分隔）</label><textarea id="termText" rows="5" placeholder="如：铁三角、区域战队、客户成功、项目战情会、复盘会"></textarea></div><div class="modal-ft"><button class="btn btn-o btn-sm" onclick="closeTerms()">取消</button><button class="btn btn-p btn-sm" onclick="saveTerms()">保存并更新描述</button></div></div></div>
<div id="toast" class="toast"></div>

<script>
const API = '/api';
let descs = [];
let editStates = {};
let enterpriseTerms = localStorage.getItem('lm_terms') || '';
const savedDims = localStorage.getItem('lm_dims');
const dims = savedDims ? JSON.parse(savedDims) : [];
const savedDescs = localStorage.getItem('lm_descs');
if (savedDescs) { try { descs = JSON.parse(savedDescs); } catch(e) {} }
function termList() { return enterpriseTerms.split(/[，,、\n]/).map(s => s.trim()).filter(Boolean); }
function renderTermPreview() { const terms = termList(); const el = document.getElementById('termPreview'); if (!el) return; el.innerHTML = terms.length ? terms.map(t => `<span class="term-chip">${t}</span>`).join('') : '尚未录入。可加入公司内部称谓、业务线名称、管理机制、文化关键词等。'; }
async function init() { renderTermPreview(); if (descs.length > 0) { showContent(); return; } if (dims.length === 0) { descs = []; showContent(); return; } await generateAllDescriptions(); }
async function generateAllDescriptions() {
  const companyInfo = localStorage.getItem('lm_company_info') || '';
  const level = companyInfo ? (JSON.parse(companyInfo)['建模层级'] || '中层管理者') : '中层管理者';
  document.getElementById('loadingArea').classList.remove('hidden'); document.getElementById('contentArea').classList.add('hidden');
  try { const resp = await fetch(`${API}/generate-descriptions`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ dimensions:dims, company_info:companyInfo, level, enterprise_terms:enterpriseTerms }) }); const data = await resp.json(); if (data.error) throw new Error(data.error); descs = (Array.isArray(data.result) ? data.result : []).map(d => ({ id:d.dimension_id, nm:d.dimension_name, desc:d.description, qc:{ok:d.quality_check ? d.quality_check.passed !== false : true, issues:d.quality_check ? (d.quality_check.issues || []) : []} })); }
  catch(err) { console.error(err); descs = dims.map(d => ({ id:d.id, nm:d.nm, desc:`围绕「${d.nm}」，管理者需要将该要求转化为团队可观察的工作动作，结合企业业务场景明确沟通、推进、复盘和改进方式，使该维度成为日常管理语言的一部分。`, qc:{ok:true,issues:[]} })); }
  localStorage.setItem('lm_descs', JSON.stringify(descs)); showContent();
}
function showContent(){document.getElementById('loadingArea').classList.add('hidden');document.getElementById('contentArea').classList.remove('hidden');render();}
function render(){document.getElementById('descList').innerHTML=descs.map(d=>{const issues=d.qc&&d.qc.issues?d.qc.issues:[];const es=editStates[d.id]||{};return `<div class="di"><div class="di-hd"><div class="di-nm">${d.nm}</div>${issues.length?'<span class="badge bg-am">⚠️ 建议审阅</span>':''}</div><div class="di-txt">${d.desc}</div>${issues.map(i=>`<div class="di-issue">⚠️ ${i}</div>`).join('')}<div class="di-ft"><button class="btn btn-g btn-sm" onclick="toggleRegen('${d.id}')">✏️ 编辑方向后AI润色</button><button class="btn btn-g btn-sm" onclick="quickPolish('${d.id}')">🔄 重新润色</button></div>${es.regen?`<div class="regen-row"><input id="rd_${d.id}" placeholder="输入修改方向，如：更聚焦业务结果或企业专有词汇…"><button class="regen-btn" onclick="regenDesc('${d.id}')">AI润色</button></div>`:''}</div>`;}).join('');}
function toggleRegen(id){editStates[id]={...(editStates[id]||{}),regen:!(editStates[id]?.regen)};render();setTimeout(()=>document.getElementById('rd_'+id)?.focus(),50);}
async function quickPolish(id){await regenDesc(id,'在保持原意基础上提升业务具体度，并融入企业专有词汇');}
async function regenDesc(id,presetDirection){const d=descs.find(x=>x.id===id);if(!d)return;const original=d.desc;const dir=presetDirection||document.getElementById('rd_'+id)?.value||'优化表述';editStates[id]={};d.desc='⏳ AI 正在按编辑方向润色…';render();try{const resp=await fetch(`${API}/regenerate`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({original,direction:`${dir}；企业专有词汇：${enterpriseTerms||'无'}`,item_type:'定位描述'})});const data=await resp.json();if(data.error)throw new Error(data.error);d.desc=typeof data.result==='string'?data.result:(data.result.result||JSON.stringify(data.result));}catch(err){d.desc=original;showToast('AI润色失败，请稍后重试',true);}d.qc={ok:true,issues:[]};localStorage.setItem('lm_descs',JSON.stringify(descs));render();}
function openTerms(){document.getElementById('termText').value=enterpriseTerms;document.getElementById('termModal').classList.add('show');}
function closeTerms(){document.getElementById('termModal').classList.remove('show');}
async function saveTerms(){enterpriseTerms=document.getElementById('termText').value.trim();localStorage.setItem('lm_terms',enterpriseTerms);closeTerms();descs=[];localStorage.removeItem('lm_descs');renderTermPreview();await init();showToast('已根据企业专有词汇更新描述');}
function goNext(){localStorage.setItem('lm_descs',JSON.stringify(descs));window.location.href='step4.html';}
function showToast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.style.background=err?'#991B1B':'#1A1520';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
async function requireStudent(){
  try {
    const resp = await fetch(`${API}/auth/me`);
    const data = await resp.json();
    if (!data.user) { window.location.href='login.html'; return false; }
    if (data.user.role === 'instructor') { window.location.href='teacher.html'; return false; }
    localStorage.setItem('lm_user', JSON.stringify(data.user));
    return true;
  } catch(e) {
    window.location.href='login.html';
    return false;
  }
}
requireStudent().then(ok => { if (ok) init(); });
</script>
</body>
</html>
